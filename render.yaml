databases:
  - name: sst-db
    plan: free
    databaseName: sstdb
    user: sst_user

services:
  - type: web
    name: sst-backend
    runtime: python
    plan: free
    region: virginia
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: SST Backend
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sst-db
          property: connectionString
      - key: FRONTEND_URLS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: LOCAL_ORIGIN_REGEX
        value: https?://(localhost|127\.0\.0\.1)(:\d+)?$
